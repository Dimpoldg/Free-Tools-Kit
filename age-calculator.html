<!DOCTYPE html>

<head>
<meta charset="UTF-8">
<title>Age Calculator - Free Tools Kit</title>

<meta name="description" content="Calculate your exact age in years, months and days with this free online age calculator tool.">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

header{
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.container{
  margin-top:30px;
}

input, button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
}

button{
  background:#00c6ff;
  cursor:pointer;
}

.result{
  margin-top:20px;
  font-size:20px;
}

/* Footer */
footer{
  background:#0f2027;
  color:#ccc;
  padding:25px;
  text-align:center;
  border-top:1px solid rgba(255,255,255,0.1);
  margin-top:40px;
}
</style>

</head>

<body>

<header>Age Calculator</header>

<div class="container">

<h2>Enter Your Date of Birth</h2>

<input type="date" id="dob">
<br>

<button onclick="calculateAge()">Calculate Age</button>

<div class="result" id="result"></div>

</div>

<script>
function calculateAge(){
let dob = new Date(document.getElementById("dob").value);
let today = new Date();

if(!dob.getTime()){
document.getElementById("result").innerText="Please select a valid date!";
return;
}

let years = today.getFullYear() - dob.getFullYear();
let months = today.getMonth() - dob.getMonth();
let days = today.getDate() - dob.getDate();

if(days < 0){
months--;
days += new Date(today.getFullYear(), today.getMonth(), 0).getDate();
}

if(months < 0){
years--;
months += 12;
}

document.getElementById("result").innerHTML =
`Your Age: <br><b>${years} Years ${months} Months ${days} Days</b>`;
}
</script>
