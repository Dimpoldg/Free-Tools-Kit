<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>Modern Password Generator Online - Free Tools Kit</title>

<meta name="description" content="Generate strong and secure passwords online for free. Customize length, symbols, numbers and uppercase letters instantly.">

<meta name="keywords" content="password generator, strong password, online password tool, secure password generator">

<meta name="author" content="Free Tools Kit">

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

header{
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.container{
  margin-top:30px;
}

.box{
  max-width:500px;
  margin:auto;
  background:rgba(255,255,255,0.05);
  padding:20px;
  border-radius:15px;
}

input[type="range"]{
  width:80%;
}

label{
  display:block;
  margin:10px;
}

input[type="checkbox"]{
  transform:scale(1.2);
  margin-right:5px;
}

.password-box{
  margin:15px 0;
  padding:15px;
  background:rgba(0,0,0,0.3);
  border-radius:10px;
  font-size:18px;
  word-break:break-all;
}

button{
  padding:12px 20px;
  margin:10px;
  border:none;
  border-radius:10px;
  background:#00c6ff;
  color:black;
  font-weight:bold;
  cursor:pointer;
}

footer{
  margin-top:40px;
  padding:20px;
  font-size:13px;
  color:#aaa;
  border-top:1px solid rgba(255,255,255,0.1);
}

</style>

</head>

<body>

<header>🔐 Password Generator</header>

<div class="container">

<div class="box">

<h3>Generate Strong Password</h3>

<p>Password Length: <span id="lenVal">12</span></p>
<input type="range" id="length" min="6" max="32" value="12">

<label><input type="checkbox" id="upper" checked> Uppercase (A-Z)</label>
<label><input type="checkbox" id="numbers" checked> Numbers (0-9)</label>
<label><input type="checkbox" id="symbols" checked> Symbols (!@#)</label>

<button onclick="generatePassword()">Generate Password</button>

<div class="password-box" id="output">Your password will appear here</div>

<button onclick="copyPassword()">Copy Password</button>

</div>

</div>

<script>

const length = document.getElementById("length");
const lenVal = document.getElementById("lenVal");

length.oninput = () => {
  lenVal.innerText = length.value;
};

function generatePassword(){

let lower = "abcdefghijklmnopqrstuvwxyz";
let upper = "ABCDEFGHIJKLMNOPQRSTUVWXYZ";
let numbers = "0123456789";
let symbols = "!@#$%^&*()_+{}[]<>?";

let chars = lower;

if(document.getElementById("upper").checked) chars += upper;
if(document.getElementById("numbers").checked) chars += numbers;
if(document.getElementById("symbols").checked) chars += symbols;

let password = "";

for(let i=0;i<length.value;i++){
  password += chars.charAt(Math.floor(Math.random() * chars.length));
}

document.getElementById("output").innerText = password;

}

function copyPassword(){
let text = document.getElementById("output").innerText;
navigator.clipboard.writeText(text);
alert("Password copied!");
}

</script>

<footer>
© 2026 Free Tools Kit | Secure Password Generator
</footer>

</body>
</html>
