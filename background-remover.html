<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">

<title>AI Background Remover - Free Tools Kit</title>

<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  color:white;
  text-align:center;
}

header{
  padding:20px;
  font-size:26px;
  font-weight:bold;
}

.container{
  margin-top:20px;
}

input, button{
  padding:12px;
  margin:10px;
  border:none;
  border-radius:10px;
  width:250px;
}

button{
  background:#00c6ff;
  font-weight:bold;
  cursor:pointer;
}

canvas{
  margin-top:20px;
  max-width:90%;
  border-radius:15px;
  background:white;
}

.result{
  margin-top:15px;
  font-size:18px;
  min-height:20px;
}

footer{
  margin-top:40px;
  padding:20px;
  background:#0f2027;
  color:#ccc;
}

</style>

</head>

<body>

<header>AI Background Remover</header>

<div class="container">

<input type="file" id="imageInput" accept="image/*">
<br>

<button onclick="removeBackground()">Remove Background (AI)</button>
<button onclick="downloadImage()">Download</button>

<br>

<canvas id="canvas"></canvas>

<div class="result">Upload image to start</div>

</div>

<!-- TensorFlow + BodyPix AI -->
<script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@3.21.0"></script>
<script src="https://cdn.jsdelivr.net/npm/@tensorflow-models/body-pix@2.2.0"></script>

<script>

let canvas = document.getElementById("canvas");
let ctx = canvas.getContext("2d");

let img = new Image();
let model = null;
let imageLoaded = false;

// LOAD MODEL
async function loadModel(){
document.querySelector(".result").innerText = "Loading AI model... please wait";
model = await bodyPix.load();
document.querySelector(".result").innerText = "AI Ready! Upload image";
}

loadModel();

// IMAGE UPLOAD
document.getElementById("imageInput").addEventListener("change", function(e){

let file = e.target.files[0];
if(!file) return;

let reader = new FileReader();

reader.onload = function(event){

img.onload = function(){
canvas.width = img.width;
canvas.height = img.height;
ctx.drawImage(img,0,0);
imageLoaded = true;
document.querySelector(".result").innerText = "Image loaded";
}

img.src = event.target.result;
}

reader.readAsDataURL(file);
});

// AI REMOVE BACKGROUND
async function removeBackground(){

if(!imageLoaded){
document.querySelector(".result").innerText = "Upload image first!";
return;
}

document.querySelector(".result").innerText = "Processing AI...";

const segmentation = await model.segmentPerson(canvas);

// get image data
const imageData = ctx.getImageData(0,0,canvas.width,canvas.height);
const pixels = imageData.data;
const mask = segmentation.data;

for(let i=0;i<mask.length;i++){
if(mask[i] === 0){
pixels[i*4 + 3] = 0; // remove background
}
}

ctx.putImageData(imageData,0,0);

document.querySelector(".result").innerText = "Background Removed by AI!";
}

// DOWNLOAD
function downloadImage(){

let link = document.createElement("a");
link.download = "ai-background-removed.png";
link.href = canvas.toDataURL("image/png");
link.click();

}

</script>

<footer>
Free Tools Kit | AI Background Remover Tool
</footer>

</body>
</html>
