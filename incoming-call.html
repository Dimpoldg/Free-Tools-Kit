<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Incoming Call Tool</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://html2canvas.hertzen.com/dist/html2canvas.min.js"></script>

<style>
body{
  margin:0;
  font-family:Arial;
  background:linear-gradient(135deg,#0f2027,#203a43,#2c5364);
  display:flex;
  flex-direction:column;
  align-items:center;
  min-height:100vh;
}

/* TITLE */
header{
  color:white;
  font-size:22px;
  font-weight:bold;
  margin:20px;
}

/* MAIN CARD */
.card{
  width:340px;
  background:rgba(255,255,255,0.1);
  backdrop-filter:blur(15px);
  border-radius:20px;
  padding:20px;
  text-align:center;
  color:white;
  box-shadow:0 10px 30px rgba(0,0,0,0.4);
}

/* PROFILE */
.profile{
  width:120px;
  height:120px;
  border-radius:50%;
  border:4px solid #00ffcc;
  animation:ring 2s infinite;
}

@keyframes ring{
  0%{box-shadow:0 0 10px #00ffcc;}
  50%{box-shadow:0 0 30px #00ffcc;}
  100%{box-shadow:0 0 10px #00ffcc;}
}

/* TEXT */
.name{
  font-size:22px;
  margin-top:10px;
}

.number{
  color:#ccc;
  margin-bottom:10px;
}

.status{
  font-size:14px;
  color:#aaa;
  margin-bottom:20px;
}

/* BUTTONS */
.btns{
  display:flex;
  justify-content:space-between;
  gap:10px;
}

button{
  flex:1;
  padding:10px;
  border:none;
  border-radius:10px;
  font-weight:bold;
  cursor:pointer;
}

.accept{
  background:#25D366;
  color:white;
}

.reject{
  background:#ff4d4d;
  color:white;
}

/* CONTROLS */
.controls{
  width:340px;
  margin-top:15px;
  background:white;
  padding:15px;
  border-radius:15px;
}

input, button{
  width:100%;
  padding:10px;
  margin:5px 0;
  border-radius:8px;
  border:none;
}

/* DOWNLOAD */
.download{
  background:#128C7E;
  color:white;
}
</style>
</head>

<body>

<header>📞 Incoming Call Generator</header>

<!-- CARD -->
<div class="card" id="capture">

<img id="img" class="profile" src="https://via.placeholder.com/120">

<div id="name" class="name">Rahul Sharma</div>
<div id="number" class="number">+91 98765 43210</div>
<div id="status" class="status">Incoming Call...</div>

<div class="btns">
<button class="accept" onclick="accept()">Accept</button>
<button class="reject" onclick="reject()">Reject</button>
</div>

</div>

<!-- CONTROLS -->
<div class="controls">

<input type="file" onchange="setImg(event)">

<input type="text" id="n" placeholder="Name">
<input type="text" id="num" placeholder="Number">

<button onclick="setData()">Set Data</button>

<button class="download" onclick="downloadCall()">Download Screenshot</button>

</div>

<script>

// IMAGE
function setImg(e){
  document.getElementById("img").src =
    URL.createObjectURL(e.target.files[0]);
}

// DATA
function setData(){
  document.getElementById("name").innerText =
    document.getElementById("n").value;

  document.getElementById("number").innerText =
    document.getElementById("num").value;
}

// ACCEPT
function accept(){
  document.getElementById("status").innerText="Call Connected";
}

// REJECT
function reject(){
  document.getElementById("status").innerText="Call Ended";
}

// DOWNLOAD
function downloadCall(){
  html2canvas(document.getElementById("capture")).then(canvas=>{
    let a=document.createElement("a");
    a.download="incoming-call.png";
    a.href=canvas.toDataURL("image/png");
    a.click();
  });
}

</script>

</body>
</html>
